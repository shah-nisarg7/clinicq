<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClinicQ</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f4f4;
    color: #222;
    margin: 0;
    padding: 20px;
  }
  h1 { margin: 0 0 4px 0; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }

  .box {
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 16px;
    max-width: 400px;
    margin: 40px auto;
  }
  .box h2 { margin-top: 0; font-size: 18px; }

  label { display: block; margin-top: 10px; font-size: 13px; color: #444; }
  input {
    width: 100%;
    padding: 6px;
    border: 1px solid #bbb;
    border-radius: 3px;
    margin-top: 3px;
    font-size: 14px;
  }
  button {
    background: #2c5f9e;
    color: #fff;
    border: none;
    padding: 8px 14px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 14px;
    margin-top: 14px;
  }
  button:hover { background: #234b7d; }
  button.secondary { background: #777; }
  button.secondary:hover { background: #5c5c5c; }

  .error-msg { color: #a33; font-size: 13px; margin-top: 8px; }
  .toggle-link { font-size: 13px; color: #2c5f9e; cursor: pointer; margin-top: 10px; display: inline-block; }

  #dashboard { display: none; }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #ccc;
    padding-bottom: 10px;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<div id="auth-screen" class="box">
  <h2 id="auth-title">Clinic Login</h2>

  <div id="login-form">
    <label>Clinic ID</label>
    <input type="text" id="login-clinic-id" placeholder="e.g. CLINIC_001">
    <label>Password</label>
    <input type="password" id="login-password">
    <button onclick="doLogin()">Log In</button>
    <div id="login-error" class="error-msg"></div>
    <div class="toggle-link" onclick="showRegister()">Don't have an account? Register</div>
  </div>

  <div id="register-form" style="display:none;">
    <label>Choose a Clinic ID</label>
    <input type="text" id="reg-clinic-id" placeholder="e.g. MY_CLINIC">
    <label>Choose a Password</label>
    <input type="password" id="reg-password">
    <label>Invite Code</label>
    <input type="text" id="reg-invite-code" placeholder="admin invite code">
    <button onclick="doRegister()">Register</button>
    <div id="register-error" class="error-msg"></div>
    <div class="toggle-link" onclick="showLogin()">Already have an account? Log in</div>
  </div>
</div>

<!-- empty for now  ill add the actual queue display in the next commit for now
     just wanted to confirm login -> dashboard switch works first -->
<div id="dashboard">
  <div class="top-bar">
    <div>
      <h1>ClinicQ</h1>
      <div class="subtitle" id="clinic-label"></div>
    </div>
    <div>
      <button class="secondary" onclick="logout()">Log Out</button>
    </div>
  </div>
  <p>logged in ok. queue display goes here next.</p>
</div>

<script>
// storing clinic_id in localStorage so refreshing the page doesnt log you out.
// NOT storing the password anywhere, only the clinic id.
let clinicId = localStorage.getItem("clinicq_clinic_id");

window.onload = function () {
  if (clinicId) {
    showDashboard();
  }
};

function showRegister() {
  document.getElementById("login-form").style.display = "none";
  document.getElementById("register-form").style.display = "block";
  document.getElementById("auth-title").innerText = "Register Clinic";
}
function showLogin() {
  document.getElementById("register-form").style.display = "none";
  document.getElementById("login-form").style.display = "block";
  document.getElementById("auth-title").innerText = "Clinic Login";
}

async function doLogin() {
  const id = document.getElementById("login-clinic-id").value.trim();
  const pw = document.getElementById("login-password").value;
  const errBox = document.getElementById("login-error");
  errBox.innerText = "";

  if (!id || !pw) {
    errBox.innerText = "enter clinic id and password";
    return;
  }

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ clinic_id: id, password: pw })
    });
    const data = await res.json();

    if (!data.success) {
      errBox.innerText = data.error || "login failed";
      return;
    }

    clinicId = data.clinic_id;
    localStorage.setItem("clinicq_clinic_id", clinicId);
    showDashboard();

  } catch (err) {
    errBox.innerText = "couldnt reach server, try again";
    console.error(err);
  }
}

async function doRegister() {
  const id = document.getElementById("reg-clinic-id").value.trim();
  const pw = document.getElementById("reg-password").value;
  const invite = document.getElementById("reg-invite-code").value.trim();
  const errBox = document.getElementById("register-error");
  errBox.innerText = "";

  if (!id || !pw || !invite) {
    errBox.innerText = "fill in all fields";
    return;
  }

  try {
    const res = await fetch("/api/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ clinic_id: id, password: pw, invite_code: invite })
    });
    const data = await res.json();

    if (!data.success) {
      errBox.innerText = data.error || "registration failed";
      return;
    }

    // dont auto login after registering, just send them back to the login form.
    showLogin();
    document.getElementById("login-clinic-id").value = id;

  } catch (err) {
    errBox.innerText = "couldnt reach server, try again";
    console.error(err);
  }
}

function logout() {                
  clinicId = null;
  localStorage.removeItem("clinicq_clinic_id");
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("auth-screen").style.display = "block";
}

function showDashboard() {
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  document.getElementById("clinic-label").innerText = "Logged in as " + clinicId;
}
</script>

</body>
</html>
