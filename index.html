<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClinicQ</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f4f4;
    color: #222;
    margin: 0;
    padding: 20px;
  }
  h1 { margin: 0 0 4px 0; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }

  .box {
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 16px;
    max-width: 400px;
    margin: 40px auto;
  }
  .box h2 { margin-top: 0; font-size: 18px; }

  label { display: block; margin-top: 10px; font-size: 13px; color: #444; }
  input {
    width: 100%;
    padding: 6px;
    border: 1px solid #bbb;
    border-radius: 3px;
    margin-top: 3px;
    font-size: 14px;
  }
  button {
    background: #2c5f9e;
    color: #fff;
    border: none;
    padding: 8px 14px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 14px;
    margin-top: 14px;
  }
  button:hover { background: #234b7d; }
  button.secondary { background: #777; }
  button.secondary:hover { background: #5c5c5c; }

  .error-msg { color: #a33; font-size: 13px; margin-top: 8px; }
  .toggle-link { font-size: 13px; color: #2c5f9e; cursor: pointer; margin-top: 10px; display: inline-block; }

  #dashboard { display: none; }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #ccc;
    padding-bottom: 10px;
    margin-bottom: 20px;
  }

  .add-patient-form {
    background: #fff;
    border: 1px solid #ccc;
    padding: 14px;
    margin-bottom: 20px;
  }
  .add-patient-form .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .add-patient-form .row > div { flex: 1; min-width: 140px; }

  .columns {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .column {
    flex: 1;
    min-width: 260px;
    background: #fff;
    border: 1px solid #ccc;
  }
  .column-header {
    background: #eee;
    padding: 8px 10px;
    font-weight: bold;
    font-size: 13px;
    border-bottom: 1px solid #ccc;
  }
  .patient-card {
    border-bottom: 1px solid #eee;
    padding: 10px;
    font-size: 14px;
  }
  .patient-card:last-child { border-bottom: none; }
  .patient-name { font-weight: bold; }
  .patient-meta { color: #666; font-size: 12px; margin-top: 3px; }
  .walkin-tag {
    background: #a33;
    color: #fff;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 2px;
    margin-right: 6px;
  }
  .empty-msg { padding: 10px; color: #999; font-size: 13px; }
</style>
</head>
<body>

<div id="auth-screen" class="box">
  <h2 id="auth-title">Clinic Login</h2>

  <div id="login-form">
    <label>Clinic ID</label>
    <input type="text" id="login-clinic-id" placeholder="e.g. CLINIC_001">
    <label>Password</label>
    <input type="password" id="login-password">
    <button onclick="doLogin()">Log In</button>
    <div id="login-error" class="error-msg"></div>
    <div class="toggle-link" onclick="showRegister()">Don't have an account? Register</div>
  </div>

  <div id="register-form" style="display:none;">
    <label>Choose a Clinic ID</label>
    <input type="text" id="reg-clinic-id" placeholder="e.g. MY_CLINIC">
    <label>Choose a Password</label>
    <input type="password" id="reg-password">
    <label>Invite Code</label>
    <input type="text" id="reg-invite-code" placeholder="admin invite code">
    <button onclick="doRegister()">Register</button>
    <div id="register-error" class="error-msg"></div>
    <div class="toggle-link" onclick="showLogin()">Already have an account? Log in</div>
  </div>
</div>

<div id="dashboard">
  <div class="top-bar">
    <div>
      <h1>ClinicQ</h1>
      <div class="subtitle" id="clinic-label"></div>
    </div>
    <div>
      <button class="secondary" onclick="loadQueue()">Refresh</button>
      <button class="secondary" onclick="logout()">Log Out</button>
    </div>
  </div>

  <!-- new patient form,-->
  <div class="add-patient-form">
    <div class="row">
      <div>
        <label>Patient Name</label>
        <input type="text" id="new-name">
      </div>
      <div>
        <label>Phone</label>
        <input type="text" id="new-phone" placeholder="with country code">
      </div>
      <div>
        <label>Scheduled Time</label>
        <input type="time" id="new-time">
      </div>
      <div style="display:flex; align-items:flex-end;">
        <button onclick="addPatient(false)">Add Scheduled</button>
        <button onclick="addPatient(true)" style="margin-left:6px;">Add Walk-In</button>
      </div>
    </div>
    <div id="add-error" class="error-msg"></div>
  </div>

  <div class="columns">
    <div class="column">
      <div class="column-header">Up Next</div>
      <div id="col-scheduled"></div>
    </div>
    <div class="column">
      <div class="column-header">In Lobby</div>
      <div id="col-waiting"></div>
    </div>
    <div class="column">
      <div class="column-header">With Doctor</div>
      <div id="col-consult"></div>
    </div>
  </div>
</div>

<script>
//storing clinic_id in localstorage so refreshing page doesnt log u out
//NOT storing password anywhere, only the clinic id
let clinicId = localStorage.getItem("clinicq_clinic_id");

window.onload = function () {
  if (clinicId) {
    showDashboard();
  }
};

//just swapping which form is visible, nothing fancy
function showRegister() {
  document.getElementById("login-form").style.display = "none";
  document.getElementById("register-form").style.display = "block";
  document.getElementById("auth-title").innerText = "Register Clinic";
}
function showLogin() {
  document.getElementById("register-form").style.display = "none";
  document.getElementById("login-form").style.display = "block";
  document.getElementById("auth-title").innerText = "Clinic Login";
}

//hits the login api, if it works we save clinic id and switch to dashboard
async function doLogin() {
  const id = document.getElementById("login-clinic-id").value.trim();
  const pw = document.getElementById("login-password").value;
  const errBox = document.getElementById("login-error");
  errBox.innerText = "";

  if (!id || !pw) {
    errBox.innerText = "enter clinic id and password";
    return;
  }

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ clinic_id: id, password: pw })
    });
    const data = await res.json();

    if (!data.success) {
      errBox.innerText = data.error || "login failed";
      return;
    }

    clinicId = data.clinic_id;
    localStorage.setItem("clinicq_clinic_id", clinicId);
    showDashboard();

  } catch (err) {
    errBox.innerText = "couldnt reach server, try again";
    console.error(err);     
  }
}

//same idea as login but for making a new clinic account, needs invite code
async function doRegister() {
  const id = document.getElementById("reg-clinic-id").value.trim();     
  const pw = document.getElementById("reg-password").value;
  const invite = document.getElementById("reg-invite-code").value.trim();
  const errBox = document.getElementById("register-error");
  errBox.innerText = "";

  if (!id || !pw || !invite) {
    errBox.innerText = "fill in all fields";
    return;
  }

  try {
    const res = await fetch("/api/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ clinic_id: id, password: pw, invite_code: invite })
    });
    const data = await res.json();

    if (!data.success) {
      errBox.innerText = data.error || "registration failed";
      return;
    }

    showLogin();
    document.getElementById("login-clinic-id").value = id;

  } catch (err) {
    errBox.innerText = "couldnt reach server, try again";    
    console.error(err);
  }
}

//clear the saved clinic id and go back to login screen
function logout() {
  clinicId = null;
  localStorage.removeItem("clinicq_clinic_id");
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("auth-screen").style.display = "block";
}

function showDashboard() {
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  document.getElementById("clinic-label").innerText = "Logged in as " + clinicId;
  loadQueue();
}

//pulls current queue from the sheet and re draws the 3 columns
async function loadQueue() {
  try {
    const res = await fetch("/api/queue?clinic_id=" + encodeURIComponent(clinicId));
    const data = await res.json();

    if (!data.success) {
      console.error("queue error:", data.error);
      return;            
    }

    renderQueue(data.patients);

  } catch (err) {
    console.error("failed to load queue:", err);
  }
}

//sorts patients into the right column based on status, also shows the
//empty msg if a column has nobody in it so it doesnt look broken/blank
function renderQueue(patients) {
  const scheduledCol = document.getElementById("col-scheduled");
  const waitingCol = document.getElementById("col-waiting");
  const consultCol = document.getElementById("col-consult");

  scheduledCol.innerHTML = "";
  waitingCol.innerHTML = "";
  consultCol.innerHTML = "";

  let counts = { Scheduled: 0, Waiting: 0, "In Consult": 0 };

  patients.forEach(function (p) {
    const card = buildPatientCard(p);

    if (p.Status === "Scheduled") {
      scheduledCol.appendChild(card);
      counts.Scheduled++;
    } else if (p.Status === "Waiting") {
      waitingCol.appendChild(card);      
      counts.Waiting++;
    } else if (p.Status === "In Consult") {
      consultCol.appendChild(card);
      counts["In Consult"]++;
    }   
  });

  if (counts.Scheduled === 0) scheduledCol.innerHTML = '<div class="empty-msg">nothing scheduled</div>';
  if (counts.Waiting === 0) waitingCol.innerHTML = '<div class="empty-msg">lobby is empty</div>';
  if (counts["In Consult"] === 0) consultCol.innerHTML = '<div class="empty-msg">no one with doctor</div>';
}

//makes the little card for one patient.. no buttons on this yet, thats next
function buildPatientCard(p) {
  const card = document.createElement("div");
  card.className = "patient-card";             

  const walkinTag = p.Is_Walk_In === "True" ? '<span class="walkin-tag">WALK-IN</span>' : "";
  const timeShown = p.Status === "Scheduled" ? p.Scheduled_Time : (p.Consult_Start_Time || "--:--");

  card.innerHTML =
    '<div class="patient-name">' + walkinTag + "#" + p.ID + " — " + p.Patient_Name + "</div>" +
    '<div class="patient-meta">' + timeShown + " &middot; " + p.Phone + "</div>";

  return card;
}

//new patient form logic. defaults date to today since this is same day
//queue system, doesnt make sense to schedule for other days rn
async function addPatient(isWalkIn) {
  const name = document.getElementById("new-name").value.trim();
  const phone = document.getElementById("new-phone").value.trim();
  const time = document.getElementById("new-time").value;
  const errBox = document.getElementById("add-error");
  errBox.innerText = "";     

  if (!name || !phone) {    
    errBox.innerText = "name and phone are required";
    return;
  }
                
  // walk ins dont need a scheduled time, theyre already here
  if (!isWalkIn && !time) {
    errBox.innerText = "pick a scheduled time, or use add walk-in instead";
    return;
  }

  const today = new Date().toISOString().split("T")[0];

  try {    
    const res = await fetch("/api/patients", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        clinic_id: clinicId,
        name: name,
        phone: phone,
        scheduled_date: today,
        scheduled_time: time,
        is_walk_in: isWalkIn
      })
    });
    const data = await res.json();

    if (!data.success) {
      errBox.innerText = data.error || "couldnt add patient";
      return;
    }

    document.getElementById("new-name").value = "";
    document.getElementById("new-phone").value = "";
    document.getElementById("new-time").value = "";
    loadQueue();

  } catch (err) {
    errBox.innerText = "couldnt reach server, try again";
    console.error(err);
  }
}
</script>

</body>
</html>
